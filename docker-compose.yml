services:
  postgres:
    image: postgres:16-alpine
    container_name: financeiro-pessoal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financeiro_pessoal}
      POSTGRES_USER: ${POSTGRES_USER:-financeiro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeiro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
